<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Delivery - Vertex Express</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Header -->
  <header>
    <h1>Vertex Express</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="admin.html">Admin</a>
      <a href="track.html">Track Delivery</a>
    </nav>
  </header>

  <!-- Create Delivery Form -->
  <section class="delivery-form">
    <h2>Create Delivery</h2>
    <form id="createForm">
      <!-- Sender Info -->
      <h3>Sender Information</h3>
      <label for="senderName">Name:</label>
      <input type="text" id="senderName" required>
      
      <label for="senderAddress">Address:</label>
      <input type="text" id="senderAddress" required>
      
      <label for="senderEmail">Email:</label>
      <input type="email" id="senderEmail" required>
      
      <label for="senderPhone">Phone:</label>
      <input type="text" id="senderPhone" required>

      <!-- Receiver Info -->
      <h3>Receiver Information</h3>
      <label for="receiverName">Name:</label>
      <input type="text" id="receiverName" required>
      
      <label for="receiverAddress">Address:</label>
      <input type="text" id="receiverAddress" required>
      
      <label for="receiverEmail">Email:</label>
      <input type="email" id="receiverEmail" required>
      
      <label for="receiverPhone">Phone:</label>
      <input type="text" id="receiverPhone" required>

      <!-- Package Info -->
      <h3>Package Information</h3>
      <label for="packageDetails">Details:</label>
      <input type="text" id="packageDetails" required>
      
      <label for="weight">Weight (kg):</label>
      <input type="number" id="weight" step="0.1" required>

      <label for="shippingOption">Shipping Option:</label>
      <select id="shippingOption">
        <option value="Standard">Standard</option>
        <option value="Express">Express</option>
      </select>

      <!-- Dimensions -->
      <label for="length">Length (cm):</label>
      <input type="number" id="length" step="0.1" required>
      
      <label for="width">Width (cm):</label>
      <input type="number" id="width" step="0.1" required>
      
      <label for="height">Height (cm):</label>
      <input type="number" id="height" step="0.1" required>

      <button type="submit">Create Delivery</button>
    </form>
  </section>

  <!-- JavaScript -->
  <script>
    document.getElementById("createForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const length = parseFloat(document.getElementById("length").value);
      const width = parseFloat(document.getElementById("width").value);
      const height = parseFloat(document.getElementById("height").value);

      const deliveryData = {
        senderName: document.getElementById("senderName").value,
        senderAddress: document.getElementById("senderAddress").value,
        senderEmail: document.getElementById("senderEmail").value,
        senderPhone: document.getElementById("senderPhone").value,
        receiverName: document.getElementById("receiverName").value,
        receiverAddress: document.getElementById("receiverAddress").value,
        receiverEmail: document.getElementById("receiverEmail").value,
        receiverPhone: document.getElementById("receiverPhone").value,
        packageDetails: document.getElementById("packageDetails").value,
        weight: parseFloat(document.getElementById("weight").value),
        shippingOption: document.getElementById("shippingOption").value,
        dimensions: { length, width, height } // ✅ required by schema
      };

      try {
        const response = await fetch('http://localhost:3000/deliveries', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(deliveryData)
        });

        const data = await response.json();

        if (!response.ok) {
          alert("Error: " + data.error);
          return;
        }

        alert("Delivery created! Tracking number: " + data.trackingNumber);
        this.reset(); // clear form

      } catch (err) {
        alert("Failed to create delivery.");
        console.error(err);
      }
    });
  </script>
</body>
</html>
