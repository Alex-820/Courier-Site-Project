<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Courier Management</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; background:#f9f9f9; }
  .card { background: #fff; padding: 20px; margin-bottom: 30px; border-radius: 8px; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
  .grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); gap: 10px; margin-bottom: 20px;}
  input, select, button { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box;}
  button { cursor: pointer; background: orange; color:#fff; border:none; border-radius: 4px; }
  h2,h3 { margin-bottom: 10px;}
  table { width: 100%; border-collapse: collapse; margin-top: 10px;}
  th,td { padding: 8px; border: 1px solid #ccc; text-align: left;}
</style>
</head>
<body>

<div id="loginSection">
  <h2>Admin Login</h2>
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <button type="button" onclick="adminLogin()">Login</button>
</div>

<!-- Create Delivery Section -->
<div class="card">
  <h2>Create Delivery</h2>

  <div class="grid">
    <div>
      <h3>Sender Information</h3>
      <input id="senderName" placeholder="Sender Full Name">
      <input id="senderPhone" placeholder="Sender Phone">
      <input id="senderEmail" placeholder="Sender Email">
      <input id="senderAddress" placeholder="Sender Address">
      <input id="origin" placeholder="Origin City / Country">
    </div>

    <div>
      <h3>Receiver Information</h3>
      <input id="receiverName" placeholder="Receiver Full Name">
      <input id="receiverPhone" placeholder="Receiver Phone">
      <input id="receiverEmail" placeholder="Receiver Email">
      <input id="receiverAddress" placeholder="Receiver Address">
      <input id="destination" placeholder="Destination City / Country">
    </div>
  </div>

  <h3>Package Information</h3>
  <div class="grid">
    <input id="weight" placeholder="Weight (kg)">
    <input id="pieces" placeholder="Number of Pieces">
    <select id="service">
      <option>Express</option>
      <option>Standard</option>
      <option>International Priority</option>
      <option>Freight</option>
    </select>
    <select id="packageType">
      <option>Document</option>
      <option>Parcel</option>
      <option>Electronics</option>
      <option>Cargo</option>
    </select>
    <input id="estimatedDeliveryDate" placeholder="Estimated Delivery Date">
  </div>

  <h3>Package Contents (Customs Information)</h3>
  <div id="itemsContainer"></div>
  <button type="button" onclick="addItem()">Add Another Item</button>

  <h3>Shipment Status</h3>
  <select id="shipmentStatus">
    <option>Shipment Created</option>
    <option>Picked Up</option>
    <option>In Transit</option>
    <option>Customs Clearance</option>
    <option>Out for Delivery</option>
    <option>Delivered</option>
  </select>

  <h3>Current Location</h3>
  <input id="currentLocation" placeholder="Current Location of Package">

  <button onclick="createDelivery()">Create Shipment</button>
</div>

<!-- Manage Deliveries Section -->
<div class="card">
  <h2>Manage Deliveries</h2>
  
  <div style="margin-bottom: 20px;">
    <input id="searchTracking" placeholder="Enter Tracking Number">
    <button onclick="searchDelivery()">Search</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Tracking Number</th>
        <th>Sender</th>
        <th>Receiver</th>
        <th>Current Location</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="deliveriesTable">
      <tr><td colspan="6" style="text-align:center;">No deliveries loaded.</td></tr>
    </tbody>
  </table>
</div>

<script>
  function addItem() {
    const container = document.getElementById("itemsContainer");
    if (!container) {
      console.error("itemsContainer not found!");
      return;
    }
    const newRow = document.createElement("div");
    newRow.classList.add("grid", "item-row");
    newRow.innerHTML = `
      <input class="itemName" placeholder="Item Name">
      <input class="itemDescription" placeholder="Item Description">
      <input class="itemQuantity" placeholder="Quantity">
      <input class="itemPrice" placeholder="Declared Value">
      <select class="currency">
        <option value="USD">$ USD</option>
        <option value="EUR">€ EUR</option>
        <option value="GBP">£ GBP</option>
        <option value="NGN">₦ NGN</option>
        <option value="CAD">$ CAD</option>
        <option value="AUD">$ AUD</option>
        <option value="JPY">¥ JPY</option>
      </select>
    `;
    container.appendChild(newRow);
  }

  async function createDelivery() {
    const itemsContainer = document.querySelectorAll("#itemsContainer .item-row");
    const items = Array.from(itemsContainer).map(row => ({
      itemName: row.querySelector(".itemName").value,
      itemDescription: row.querySelector(".itemDescription").value,
      itemQuantity: row.querySelector(".itemQuantity").value,
      itemPrice: row.querySelector(".itemPrice").value,
      currency: row.querySelector(".currency").value
    }));

    const data = {
      senderName: document.getElementById("senderName").value,
      senderPhone: document.getElementById("senderPhone").value,
      senderEmail: document.getElementById("senderEmail").value,
      senderAddress: document.getElementById("senderAddress").value,
      receiverName: document.getElementById("receiverName").value,
      receiverPhone: document.getElementById("receiverPhone").value,
      receiverEmail: document.getElementById("receiverEmail").value,
      receiverAddress: document.getElementById("receiverAddress").value,
      origin: document.getElementById("origin").value,
      destination: document.getElementById("destination").value,
      weight: document.getElementById("weight").value,
      pieces: document.getElementById("pieces").value,
      service: document.getElementById("service").value,
      packageType: document.getElementById("packageType").value,
      estimatedDeliveryDate: document.getElementById("estimatedDeliveryDate").value,
      shipmentStatus: document.getElementById("shipmentStatus").value,
      currentLocation: document.getElementById("currentLocation").value,
      items: items
    };

    const res = await fetch("/admin/create-delivery", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    const result = await res.json();
    alert("Shipment Created. Tracking Number: " + result.trackingNumber);
  }

  // Manage Deliveries
  async function searchDelivery() {
    const tracking = document.getElementById("searchTracking").value;
    const url = tracking ? `/admin/deliveries/${tracking}` : '/admin/deliveries';
    const res = await fetch(url);
    const deliveries = await res.json();
    const table = document.getElementById("deliveriesTable");

    if (!deliveries || deliveries.length === 0) {
      table.innerHTML = `<tr><td colspan="6" style="text-align:center;">No deliveries found.</td></tr>`;
      return;
    }

    table.innerHTML = deliveries.map(d => `
      <tr>
        <td>${d.trackingNumber}</td>
        <td>${d.senderName}</td>
        <td>${d.receiverName}</td>
        <td><input value="${d.currentLocation || ''}" id="loc-${d.trackingNumber}" placeholder="Current Location"></td>
        <td>
          <select id="status-${d.trackingNumber}">
            <option ${d.shipmentStatus === 'Shipment Created' ? 'selected' : ''}>Shipment Created</option>
            <option ${d.shipmentStatus === 'Picked Up' ? 'selected' : ''}>Picked Up</option>
            <option ${d.shipmentStatus === 'In Transit' ? 'selected' : ''}>In Transit</option>
            <option ${d.shipmentStatus === 'Customs Clearance' ? 'selected' : ''}>Customs Clearance</option>
            <option ${d.shipmentStatus === 'Out for Delivery' ? 'selected' : ''}>Out for Delivery</option>
            <option ${d.shipmentStatus === 'Delivered' ? 'selected' : ''}>Delivered</option>
          </select>
        </td>
        <td><button onclick="updateDelivery('${d.trackingNumber}')">Update</button></td>
      </tr>
    `).join('');
  }

async function adminLogin() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const res = await fetch("/admin/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  if (res.ok) {
    sessionStorage.setItem("token", data.token);
    alert("Login successful!");
  } else {
    alert(data.message || "Login failed");
  }
}

async function getDeliveries() {
  const token = sessionStorage.getItem("token");

  const res = await fetch("/admin/deliveries", {
    headers: { "Authorization": "Bearer " + token }
  });

  const deliveries = await res.json();
  console.log(deliveries);
}
</script>
</script>
</body>
</html>
